name: Keep Hugging Face Space Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hf-space-keep-warm
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Ping health endpoint
        env:
          HEALTH_URL: https://atonality123-test101.hf.space/api/health
        run: |
          for attempt in 1 2 3 4 5; do
            echo "Health check attempt ${attempt}: ${HEALTH_URL}"
            http_code="$(
              curl \
                --location \
                --silent \
                --show-error \
                --max-time 45 \
                --output /tmp/hf-health-response.txt \
                --write-out "%{http_code}" \
                "$HEALTH_URL" || true
            )"

            echo "HTTP ${http_code}"
            cat /tmp/hf-health-response.txt || true
            echo

            if [[ "$http_code" =~ ^[0-9]+$ ]] && [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
              echo "Hugging Face Space is awake."
              exit 0
            fi

            sleep 30
          done

          echo "Health endpoint did not return HTTP 2xx after retries."
          exit 1
