name: CI & Deploy to Render

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # match the Dockerfile
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run smoke tests
        # python -m puts the repo root on sys.path so `app` is importable
        run: python -m pytest tests/ -v

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Notify deployment
        run: |
          echo "✅ Tests passed. Render will auto-deploy the changes."
          echo "Push was successful. Check Render dashboard for deployment status."
