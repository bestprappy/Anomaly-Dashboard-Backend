services:
  - type: web
    name: todo-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todo-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false   # set this to your GitHub Pages origin in the Render dashboard

databases:
  - name: todo-db
    plan: free
    databaseName: todos
    user: todo
