<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Todo</title>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --accent:#6366f1; --text:#e2e8f0; --muted:#94a3b8; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; background:var(--bg); color:var(--text);
         font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         display:flex; justify-content:center; padding:2rem 1rem; }
  .wrap { width:100%; max-width:560px; }
  h1 { font-size:1.6rem; margin:0 0 1.2rem; }
  form { display:flex; gap:.5rem; margin-bottom:1rem; }
  input[type=text] { flex:1; padding:.7rem .9rem; border-radius:.6rem; border:1px solid #334155;
                     background:var(--card); color:var(--text); font-size:1rem; }
  button { cursor:pointer; border:none; border-radius:.6rem; font-size:1rem; }
  .add { background:var(--accent); color:#fff; padding:.7rem 1.1rem; }
  ul { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:.5rem; }
  li { display:flex; align-items:center; gap:.7rem; background:var(--card);
       padding:.7rem .9rem; border-radius:.6rem; }
  li.done .title { text-decoration:line-through; color:var(--muted); }
  .title { flex:1; }
  .del { background:transparent; color:#f87171; font-size:1.2rem; padding:0 .3rem; }
  input[type=checkbox] { width:1.2rem; height:1.2rem; accent-color:var(--accent); }
  .err { color:#f87171; min-height:1.2rem; font-size:.9rem; margin-bottom:.5rem; }
  .empty { color:var(--muted); text-align:center; padding:1rem; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>📋 Team Todo</h1>
    <div class="err" id="err"></div>
    <form id="form">
      <input type="text" id="title" placeholder="What needs doing?" autocomplete="off" required />
      <button class="add" type="submit">Add</button>
    </form>
    <ul id="list"></ul>
  </div>

<script>
// Same-origin: the API is served from this very server, so no host needed.
const API = "";

const listEl = document.getElementById("list");
const errEl = document.getElementById("err");

function showErr(msg) { errEl.textContent = msg || ""; }

async function load() {
  showErr("");
  try {
    const res = await fetch(`${API}/todos`);
    if (!res.ok) throw new Error("HTTP " + res.status);
    render(await res.json());
  } catch (e) {
    showErr("Could not reach the API: " + e.message);
  }
}

function render(todos) {
  listEl.innerHTML = "";
  if (!todos.length) {
    listEl.innerHTML = '<div class="empty">Nothing yet — add your first task.</div>';
    return;
  }
  for (const t of todos) {
    const li = document.createElement("li");
    if (t.done) li.classList.add("done");

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = t.done;
    cb.onchange = () => toggle(t, cb.checked);

    const span = document.createElement("span");
    span.className = "title";
    span.textContent = t.title;

    const del = document.createElement("button");
    del.className = "del";
    del.textContent = "✕";
    del.title = "Delete";
    del.onclick = () => remove(t.id);

    li.append(cb, span, del);
    listEl.appendChild(li);
  }
}

document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();
  const input = document.getElementById("title");
  const title = input.value.trim();
  if (!title) return;
  showErr("");
  try {
    const res = await fetch(`${API}/todos`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title }),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    input.value = "";
    load();
  } catch (e) { showErr("Add failed: " + e.message); }
};

async function toggle(t, done) {
  try {
    const res = await fetch(`${API}/todos/${t.id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title: t.title, description: t.description, done }),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    load();
  } catch (e) { showErr("Update failed: " + e.message); }
}

async function remove(id) {
  try {
    const res = await fetch(`${API}/todos/${id}`, { method: "DELETE" });
    if (!res.ok && res.status !== 204) throw new Error("HTTP " + res.status);
    load();
  } catch (e) { showErr("Delete failed: " + e.message); }
}

load();
</script>
</body>
</html>
